<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Express Market | Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Base & Structure */
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 20px; 
            font-family: system-ui, -apple-system, sans-serif;
        }
        
        /* Card de Connexion */
        .login-card { 
            background: #1e293b; 
            border: 1px solid #334155; 
            border-radius: 16px; 
            width: 100%; 
            max-width: 400px; 
            padding: 30px; 
        }
        
        /* Éléments de Formulaire */
        .form-control { 
            background-color: #0f172a !important; 
            color: #f8fafc !important; 
            border: 1px solid #334155; 
        }
        
        .form-control:focus { 
            border-color: #3b82f6; 
            box-shadow: none; 
        }

        /* Branding demandé */
        .logo-brand {
            height: 32px;
            width: auto;
            object-fit: contain;
            display: block;
            transition: height 0.2s ease;
        }

        .brand-text {
            font-size: 24px; /* Augmenté légèrement pour un meilleur rendu visuel sur la page de login */
            font-weight: 800;
            letter-spacing: -0.5px;
        }
    </style>
</head>
<body>

<div class="login-card shadow-lg">
    
    <!-- Zone de Branding ajoutée -->
    <div class="d-flex align-items-center justify-content-center gap-2 mb-4">
        <img src="images/logo.png" alt="EM" class="logo-brand">
        <span class="brand-text">
            <span style="color: #60a5fa;">Express</span><span style="color: #f97316;">Market</span>
        </span>
    </div>

    <h3 class="fw-bold text-center text-primary mb-1">Connexion</h3>
    <p class="text-center small mb-4">Accédez à votre espace Express Market</p>

    <!-- Message d'erreur (masqué ou dynamique si vide) -->
    <div class="alert alert-danger border-0 small text-center py-2 d-none" role="alert"></div>

    <form action="index.html" method="POST">
        <div class="mb-3">
            <label class="form-label small text-white">Nom de l'utilisateur</label>
            <input type="text" name="text" class="form-control rounded-3" required autocomplete="off" placeholder="EX:Jean Pierre">
        </div>
        <div class="mb-4">
            <label class="form-label small text-white">Numero de Telephone</label>
            <input type="tel" name="tel" class="form-control rounded-3" required placeholder="EX:+237xxxxxxxx">
        </div>
        
        <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold rounded-3 mb-3">Se connecter</button>
        
        <p class="text-center text-white small mb-0">
            Pas encore de compte ? <a href="register.html" class="text-decoration-none text-info">Créer un compte</a> <span><a href="index.html">Retour</a></span>  
        </p>
    </form>
</div>

</body>
</html>
